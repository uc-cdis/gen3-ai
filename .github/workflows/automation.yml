# push will run on every pushed commit to any branch (so this will rerun the tests
# once a branch gets merged to main in addition to any new commits on any branch)
on: push

name: Automation

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  RequiredLint:
    name: Run Required Linters
    uses: uc-cdis/.github/.github/workflows/required_lint_check.yaml@fix/linting
    with:
      python-version: '3.13'
      use-cache: true

  Security:
    name: Security Pipeline
    # needs: [ RequiredLint ]
    uses: uc-cdis/.github/.github/workflows/securitypipeline.yaml@master
    with:
       python-poetry: 'true'
    secrets: inherit

  JustLint:
    name: just lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v3
        with:
          just-version: 1.46.0
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: just lint

