openapi: 3.0.2
info:
  title: Gen3 AI API
  version: "0.0.1"
  description: |
    Rough draft

servers:
  - url: https://example.com/ai
    description: Example server

tags:
  - name: Embeddings
  - name: Embeddings (Bulk)
  - name: Vector Indexing
  - name: Vector Search
  - name: Inference
  - name: AI Model Repository
    description: Hugging Face - Compatible API
  - name: AI Topics
    description: Existing support in Gen3 Discovery AI

components:
  parameters:
    # Path parameters
    TopicName:
      name: topic_name
      in: path
      required: true
      schema:
        type: string
    Namespace:
      name: namespace
      description: |
        Namespace (org/group/folder name) the model is in.
        Example: `uc-ctds/bge-large-en-v1.5-bio-mapping`
        namespace = `uc-ctds`
      in: path
      required: true
      schema:
        type: string
    AIModelName:
      name: model_name
      description: |
        Model name (after namespace name).
        Example: `uc-ctds/bge-large-en-v1.5-bio-mapping`
        model_name = `bge-large-en-v1.5-bio-mapping`
      in: path
      required: true
      schema:
        type: string
    IndexName:
      name: index_name
      in: path
      required: true
      schema:
        type: string
    EmbeddingId:
      name: embedding_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AIModel:
      name: ai_model
      in: query
      schema:
        type: string
      required: false
      description: |
        AI Model requested to be used for embedding provided content. If content provided is already embedded, this is ignored. If this model differs from what the vector index allows, the request fails (either by the index specifying an AI model and it not matching the provided one OR by the index having different dimensionality).

        Note that models require permissions to use.

        If this is not provided and your content is not embedded and the relevant vector index has an AI model specified (and you have appropriate permissions to use it), the service will use the AI Model specified from the vector index to embed your content.

    VectorIndiceNames:
      name: vector_indices
      in: query
      schema:
        type: string
      required: false
      description: |
        Comma-separated list of Vector Index `index_name`'s to search over. If not provided,
        will search over all that user has access to which are valid for the
        data.

        If any invalid vector names are provided, this will error.

        If you provide this and `ai_model` is provided, ALL indices must have
        the same AI model specified or this will fail.

        If you provide this and NO `ai_model`, ALL indices must have the
        same AI model and then your content will be embedded with that model.
        If your content is already embedded and the dimensions don't match,
        this will error.
    IncludeModelMetadata:
      name: include_metadata
      in: query
      schema:
        type: boolean
      required: false
      description: |
        Whether or not to include model and document metadata in response (if available in
        response information). Can bloat response if using bulk and relying on the same
        metadata for every call. Thus, this is FALSE by default.

    DoNotIncludeEmbeddingsInfo:
      name: no_embeddings_info
      in: query
      schema:
        type: boolean
      required: false
      description: |
        Whether or not to exclude embedding extra info in response.
        Can bloat response, so you can request not to include it. Extra info
        includes things like the index_name for the embedding and
        authz information.

    IncludeDocuments:
      name: include_docs
      in: query
      schema:
        type: boolean
      required: false
      description: |
        Whether or not to include knowledge base documents (such as from a RAG pipeline)  in response (if available in
        response information). This can bloat response if using bulk, and unless you're actioning on these, you may not need them. Thus, this is FALSE by default.

  schemas:
    VectorIndiceNames:
      type: object
      required:
        - vector_indices
      properties:
        vector_indices:
          type: array
          items:
            $ref: "#/components/schemas/VectorIndex"

    VectorIndex:
      type: object
      properties:
        index_name:
          type: string
        description:
          type: string
        dimensions:
          type: integer
          example: 1024
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
        self:
          type: string
          format: url
          example: "/vector/indices/{index_name}"

    StringArrayInput:
      type: array
      items:
        type: string
      description: List of text inputs to be embedded.

    NumberArrayInput:
      type: array
      items:
        type: array
        items:
          type: number
      description: List of number array inputs to be embedded.
      example: [[20.3, 230.1, 18.2], [35.3, 83.1, 13.9]]

    SingleInferenceResult:
      type: object
      required:
        - output
      properties:
        output:
          type: string
        input_index:
          type: integer
        conversation_id:
          type: string
        metadata:
          $ref: "#/components/schemas/InferenceMetadata"
        documents:
          $ref: "#/components/schemas/Documents"

    InferencesResponse:
      type: object
      required:
        - outputs
      properties:
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/SingleInferenceResult"

    SingleEmbeddingResultNoIndex:
      type: object
      required:
        - vector
        - embedding_id
      properties:
        vector:
          type: array
          items:
            type: number
            format: float
        embedding_id:
          type: string
          format: uuid
        info:
          type: object
          properties:
            authz:
              type: string
              format: url
              example: "/vector/indices/{index_name}"
            authz_version:
              type: integer
              example: 0
            self:
              type: string
              format: url
              example: "/vector/indices/{index_name}/embeddings/{embedding_id}"

    SingleEmbeddingResultNoIndexFromInput:
      type: object
      required:
        - vector
        - input_index
        - embedding_id
      properties:
        vector:
          type: array
          items:
            type: number
            format: float
        input_index:
          type: integer
          example: 0
        embedding_id:
          type: string
          format: uuid
        info:
          type: object
          properties:
            authz:
              type: string
              format: url
              example: "/vector/indices/{index_name}"
            authz_version:
              type: integer
              example: 0
            self:
              type: string
              format: url
              example: "/vector/indices/{index_name}/embeddings/{embedding_id}"

    SingleEmbedding:
      type: object
      required:
        - index_name
        - embedding_id
        - vector
      properties:
        vector:
          type: array
          items:
            type: number
            format: float
        embedding_id:
          type: string
          format: uuid
        info:
          type: object
          properties:
            index_name:
              type: string
            authz:
              type: string
              format: url
              example: "/vector/indices/{index_name}"
            authz_version:
              type: integer
              example: 0
            self:
              type: string
              format: url
              example: "/vector/indices/{index_name}/embeddings/{embedding_id}"

    SingleEmbeddingFromInput:
      type: object
      required:
        - index_name
        - embedding_id
        - vector
        - input_index
      properties:
        vector:
          type: array
          items:
            type: number
            format: float
        input_index:
          type: integer
          example: 0
        embedding_id:
          type: string
          format: uuid
        info:
          type: object
          properties:
            index_name:
              type: string
            authz:
              type: string
              format: url
              example: "/vector/indices/{index_name}"
            authz_version:
              type: integer
              example: 0
            self:
              type: string
              format: url
              example: "/vector/indices/{index_name}/embeddings/{embedding_id}"

    EmbeddingResponse:
      type: object
      required:
        - embeddings
      properties:
        embeddings:
          type: array
          items:
            $ref: "#/components/schemas/SingleEmbedding"
        vector_indices:
          type: array
          items:
            $ref: "#/components/schemas/VectorIndex"

    EmbeddingResponseFromInput:
      type: object
      required:
        - embeddings
      properties:
        embeddings:
          type: array
          items:
            $ref: "#/components/schemas/SingleEmbeddingFromInput"
        vector_indices:
          type: array
          items:
            $ref: "#/components/schemas/VectorIndex"

    EmbeddingResponseNoIndex:
      type: object
      required:
        - embeddings
      properties:
        embeddings:
          type: array
          items:
            $ref: "#/components/schemas/SingleEmbeddingResultNoIndex"

    EmbeddingResponseNoIndexFromInput:
      type: object
      required:
        - embeddings
      properties:
        embeddings:
          type: array
          items:
            $ref: "#/components/schemas/SingleEmbeddingResultNoIndexFromInput"

    AllTopicsResponse:
      type: object
      required:
        - topics
      properties:
        topics:
          type: array
          items:
            $ref: "#/components/schemas/SingleTopicResult"
      example:
        topics:
          - topic_name: default
            description: default topic
            topic_chain: TopicChainOpenAiQuestionAnswerRAG
            system_prompt: 'You answer questions about a specific topic. You''ll be given
              relevant context for that topic. You are acting as a search assistant for a
              researcher who will be asking you questions. The researcher is likely trying
              to find data of interest for a particular reason or with specific criteria.
              You answer and recommend information that may be of interest to that researcher.
              If you are using any particular document to answer, you should cite that and
              tell the user where they can find more information. If you don''t know the answer,
              just say that you don''t know, don''t try to make up an answer. '
            metadata:
              model_name: gpt-5-mini
              model_temperature: '0.33'
              num_similar_docs_to_find: '4'
              similarity_score_threshold: '0.5'
          - topic_name: bdc
            description: Ask about available BDC datasets, powered by public dataset metadata like study descriptions
            topic_chain: TopicChainOpenAiQuestionAnswerRAG
            system_prompt: You answer questions about datasets that are available in BioData
              Catalyst. You'll be given relevant dataset descriptions for every dataset that's
              been ingested into BioData Catalyst. You are acting as a search assistant for
              a biomedical researcher (who will be asking you questions). The researcher is
              likely trying to find datasets of interest for a particular research question.
              You should recommend datasets that may be of interest to that researcher.
            metadata:
              model_name: gpt-5-mini
              model_temperature: '0.33'
              num_similar_docs_to_find: '4'
              similarity_score_threshold: '0.5'
          - topic_name: heal
            description: Ask about available datasets, powered by public dataset metadata like study descriptions
            topic_chain: TopicChainOpenAiQuestionAnswerRAG
            system_prompt: You answer questions about datasets that are available in NIH's
              Helping to End Addiction Long-term Initiative, or HEAL Initiative data platform.
              You'll be given relevant dataset descriptions for every dataset that's been
              ingested into HEAL. You are acting as a search assistant for a biomedical researcher
              (who will be asking you questions). The researcher is likely trying to find
              datasets of interest for a particular research question. You should recommend
              datasets that may be of interest to that researcher.
            metadata:
              model_name: gpt-5-mini
              model_temperature: '0.33'
              num_similar_docs_to_find: '4'
              similarity_score_threshold: '0.5'
          - topic_name: gen3-docs
            description: Ask about Gen3 software, powered by public documentation from various sources
            topic_chain: TopicChainOpenAiQuestionAnswerRAG
            system_prompt: |
              You answer questions about the Gen3 codebase.
              You'll be given relevant markdown files from the codebase.
            metadata:
              model_name: gpt-5-mini
              model_temperature: '0.33'
              num_similar_docs_to_find: '4'
              similarity_score_threshold: '0.5'

    SingleTopicResult:
      type: object
      properties:
        topic_name:
          type: string
        topic_chain:
          type: string
        description:
          type: string
        system_prompt:
          type: string
        metadata:
          type: object

    ModelResponse:
      type: object
      required:
        - model_name
        - base_model
      properties:
        model_name:
          type: string
        base_model:
          type: string
        default_metadata:
          type: object
          description: Arbitrary key/value metadata

        # TODO: how does a user know what types of values are allowed for these?
        #       Perhaps this just needs to be in model description.
        available_metadata_fields:
          type: array
          items:
            type: string
          example:
            - model_temperature
            - reasoning_effort

    SearchRequest:
      type: object
      required:
        - input
      properties:
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: number
          description: Content to embed OR embedded content
        top_k:
          type: integer
          default: 10
        range:
          type: number
          format: float
          description: Optional similarity threshold.
        filters:
          type: object
          additionalProperties:
            type: string
          description: Filter on embedding metadata.

    SingleSearchResultNoIndex:
      type: object
      required:
        - embedding
        - metadata
      properties:
        embedding:
          $ref: '#/components/schemas/SingleEmbeddingResultNoIndex'
        metadata:
          # TODO: perhaps we need to handle other data returning
          # depending on the type of search performed. similarity_score
          # may not be relevant in searches?
          type: object
          properties:
            similarity_score:
              type: number
              format: float
            # distance_from_input:
            #   type: number
            #   format: float

    SingleSearchResult:
      type: object
      required:
        - embedding
        - metadata
      properties:
        embedding:
          $ref: '#/components/schemas/SingleEmbedding'
        metadata:
          # TODO: perhaps we need to handle other data returning
          # depending on the type of search performed. similarity_score
          # may not be relevant in searches?
          type: object
          properties:
            similarity_score:
              type: number
              format: float
            # distance_from_input:
            #   type: number
            #   format: float

    SearchResponseNoIndex:
      type: object
      required:
        - embeddings
      properties:
        embeddings:
          type: array
          items:
            $ref: "#/components/schemas/SingleSearchResultNoIndex"
        vector_indices:
          type: array
          items:
            $ref: "#/components/schemas/VectorIndex"

    SearchResponse:
      type: object
      required:
        - embeddings
      properties:
        embeddings:
          type: array
          items:
            $ref: "#/components/schemas/SingleSearchResult"

    InferenceRequest:
      type: object
      description: Bulk Inference Request, for a single request, supply a one-item array
      required:
        - inputs
      properties:
        inputs:
          type: array
          items:
            type: object
            properties:
              input:
                $ref: "#/components/schemas/StringArrayInput"
              conversation_id:
                $ref: "#/components/schemas/ConversationID"
              metadata:
                $ref: "#/components/schemas/InferenceMetadata"

    ConversationID:
      type: string
      description: |
        An existing conversation ID, used to continue from previous q's and a's.
        IMPORTANT - Not available for every model/topic (only specific ones)

    Documents:
      type: array
      items:
        type: object
        properties:
          page_content:
            type: string
          metadata:
            type: object
            properties:
              row:
                type: integer
              source:
                type: string

    InferenceMetadata:
      type: object
      description: |
        Additional metadata to pass to the model/topic. This requires special auth
        and any invalid metadata for the particular model/topic will cause an error.
      example:
        model_temperature: '0.33'
        num_similar_docs_to_find: '4'
        similarity_score_threshold: '0.5'

  responses:
    NotFound:
      description: Resource not found
    BadRequest:
      description: Invalid request payload or parameters
    Success:
      description: Successful operation

paths:
  # ----------- Embeddings -------------
  # Let's not support this at all for now, but we can add it later if needed.
  # This muddies the intended usage with a global search that will be inefficient.
  # The intended setup will always include the vector index information anyway.
  #
  # /embeddings/{embedding_uuid}:
  #   get:
  #     tags:
  #       - Embeddings
  #     summary: Read embedding from unknown index
  #     description: |
  #       This will require a lookup to know what index this is in, so will be
  #       less efficient than `/vector/indices/{index_name}/embeddings/{embedding_uuid}`.
  #     parameters:
  #       - $ref: "#/components/parameters/EmbeddingId"
  #     responses:
  #       "200":
  #         description: Embedding detail
  #         content:
  #           application/json:
  #             schema:
  #               $ref: "#/components/schemas/SingleEmbeddingFromInput"
  #       "404":
  #         $ref: "#/components/responses/NotFound"

  /vector/indices/{index_name}/embeddings/{embedding_uuid}:
    get:
      tags:
        - Embeddings
      summary: Read embedding from index
      parameters:
        - $ref: "#/components/parameters/IndexName"
        - $ref: "#/components/parameters/EmbeddingId"
      responses:
        "200":
          description: Embedding detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleEmbedding"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Embeddings
      summary: Update embedding in index
      parameters:
        - $ref: "#/components/parameters/IndexName"
        - $ref: "#/components/parameters/EmbeddingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                embedding:
                  type: array
                  items:
                    type: number
                    format: float
      responses:
        "200":
          description: Updated embedding with SAME ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleEmbedding"
        "400":
          description: Dimensions don't match or other invalid input
    delete:
      tags:
        - Embeddings
      summary: Delete embedding from index
      parameters:
        - $ref: "#/components/parameters/IndexName"
        - $ref: "#/components/parameters/EmbeddingId"
      responses:
        "204":
          description: Successfully deleted

  # ----------- Embeddings (Bulk) -------------
  /embeddings/bulk:
    post:
      tags:
        - Embeddings (Bulk)
      summary: Read select embeddings from unknown indices
      parameters:
        - $ref: "#/components/parameters/DoNotIncludeEmbeddingsInfo"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StringArrayInput"
            example: ["embedding_uuid_0", "embedding_uuid_1"]
      responses:
        "200":
          description: Embedding detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /vector/indices/{index_name}/embeddings/bulk:
    post:
      tags:
        - Embeddings (Bulk)
      summary: Read select embeddings from index
      parameters:
        - $ref: "#/components/parameters/IndexName"
        - $ref: "#/components/parameters/DoNotIncludeEmbeddingsInfo"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StringArrayInput"
            example: ["embedding_uuid_0", "embedding_uuid_1"]
      responses:
        "200":
          description: Embedding detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingResponseNoIndexFromInput"
        "400":
          $ref: "#/components/responses/BadRequest"

  /vector/indices/{index_name}/embeddings:
    get:
      tags:
        - Embeddings
      summary: Read all embeddings from index
      parameters:
        - $ref: "#/components/parameters/IndexName"
        - $ref: "#/components/parameters/DoNotIncludeEmbeddingsInfo"
      responses:
        "200":
          description: Embeddings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingResponseNoIndexFromInput"

        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      tags:
        - Embeddings
      summary: Create embeddings in index
      description: |
        Add embeddings to an index.

        This supports providing raw embeddings or content to be embedded.

        For the later, this will interact with Gen3's AI Model Inference support to use the provided model OR infer required model from the index.

        This will fail if the index does not support the model provided (e.g. another
        model is already listed for the index AND/OR dimensions differ from existing
        index).

        This will also fail if the provided raw embeddings do not meet dimensionality required by the index.
      parameters:
        - $ref: "#/components/parameters/IndexName"
        - $ref: "#/components/parameters/AIModel"
        - $ref: "#/components/parameters/DoNotIncludeEmbeddingsInfo"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/StringArrayInput"
                - $ref: "#/components/schemas/NumberArrayInput"
              description: Content to be embedded OR raw embeddings.
      responses:
        "200":
          description: Embeddings added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingResponseNoIndexFromInput"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ----------- Vector Indexing -------------
  /vector/indices:
    get:
      tags:
        -  Vector Indexing
      summary: Real all indices
      responses:
        "200":
          description: Index detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorIndiceNames'
    post:
      tags:
        -  Vector Indexing
      summary: Create index
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                index_name:
                  type: string
                description:
                  type: string
                dimensions:
                  type: integer
                  example: 1024
      responses:
        "200":
          description: Index detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorIndex'
  /vector/indices/{index_name}:
    get:
      tags:
        -  Vector Indexing
      summary: Read index info
      parameters:
        - $ref: "#/components/parameters/IndexName"
      responses:
        "200":
          description: Index detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorIndex'
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        -  Vector Indexing
      summary: Update index info
      description: |
        Only for patching update-able fields about the index.

        Right now dimensions and name cannot be altered. You must create a new
        index if you need a different dimension/name (and consider deleting this one).

        If you are looking for **how to add embeddings** to an index, look
        for `/vector/indices/{index_name}/embedding` endpoints.
      parameters:
        - $ref: "#/components/parameters/IndexName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VectorIndex'
      responses:
        "200":
          description: Success

    delete:
      tags:
        -  Vector Indexing
      summary: Delete index
      parameters:
        - $ref: "#/components/parameters/IndexName"
      responses:
        "204":
          description: No content

  # ----------- Vector Search -------------
  /vector/search:
    post:
      tags:
        -  Vector Search
      summary: Search embeddings across unknown indices
      parameters:
        - $ref: "#/components/parameters/VectorIndiceNames"
        - $ref: "#/components/parameters/AIModel"
        - $ref: "#/components/parameters/DoNotIncludeEmbeddingsInfo"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"


  /vector/indices/{index_name}/search:
    post:
      tags:
        -  Vector Search
      summary: Search embeddings in index
      parameters:
        - $ref: "#/components/parameters/IndexName"
        - $ref: "#/components/parameters/AIModel"
        - $ref: "#/components/parameters/DoNotIncludeEmbeddingsInfo"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponseNoIndex"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ----------- Inference -------------
  /v1/responses:
    post:
      tags:
        - Inference
      summary: Run inference with a model (supports Embedding models).
      description: |
        See the [Open Responses Specification](https://openresponses.org)
        for more details.
      responses:
        "200":
          description: Inference result

  # ----------- AI Model Repository -------------
  /ai-models/{namespace}/{model_name}:
    head:
      tags:
        - AI Model Repository
      summary: Read AI model metadata
      parameters:
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/AIModelName"
      responses:
        "200":
          description: Model detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  example:
                    type: string
    get:
      tags:
        - AI Model Repository
      summary: Read AI model
